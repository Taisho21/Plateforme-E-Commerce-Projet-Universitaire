<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #333; margin: 0; padding: 40px 0; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        h2 { text-align: center; color: #27ae60; margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: 1 / -1; }

        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none;
        }
        input:focus { border-color: #27ae60; }

        input[type="submit"] {
            width: 100%; padding: 14px; background: #27ae60; color: white;
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        input[type="submit"]:hover { background: #219150; }
        
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; }
        .login-link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        a { color: #27ae60; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Rejoindre Enjoy</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="post" action="{{ url_for('inscription_complete') }}">
            <div class="grid">
                <input type="text" name="prenom" placeholder="Prénom" required>
                <input type="text" name="nom" placeholder="Nom" required>
                
                <input type="text" name="email_in" placeholder="Email" class="full" required>
                <input type="password" name="mdp_in" placeholder="Mot de passe" class="full" required>
                <input type="text" name="numero" placeholder="Téléphone" class="full" required>

                <div class="full" style="display:flex; gap:10px;">
                    <input type="text" name="num_rue" placeholder="N°" style="width:20%;" required>
                    <input type="text" name="nom_rue" placeholder="Rue" style="width:80%;" required>
                </div>

                <input type="text" name="nom_ville" placeholder="Ville" required>
                <input type="text" name="code_postal" placeholder="Code Postal" required>
                
                <input type="text" name="parrain_nom" placeholder="Parrain (optionnel)" class="full">
            </div>
            
            <input type="submit" value="S'INSCRIRE">
        </form>
        
        <div class="login-link">
            Déjà inscrit ? <a href="{{url_for('connexion')}}">Se connecter</a>
        </div>
    </div>

</body>
</html>
